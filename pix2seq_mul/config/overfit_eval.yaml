data:
  num_classes: 80
  max_tubes_per_clip: 30  # 最大目标数
  persons_per_clip: 2  # 每张图片最大人数
  tube_frames: 8
  num_keypoints: 16
  class_label_corruption: "rand_n_fake_cls"
  image_size: 512  # image_size: 640
  jitter_scale: [0.3, 2.0]  # 随即缩放比例
  color_jitter_strength: 0.5  # 颜色抖动强度

tokenization:
  quantization_bins: 1000
  eos_token_weight: 0.1
  mix_rate: 0.5
  random_ordering: false

model:
  patch_size: 16
  num_encoder_layers: 6
  num_decoder_layers: 6
  d_model: 256
  nhead: 8
  dim_feedforward: 1024
  dropout: 0.1
  drop_path: 0.1
  shared_decoder_embedding: true
  decoder_output_bias: true
  pad_token_id: 0
  bos_token_id: 1
  eos_token_id: 2
  llama_model: true
  # pretrained_path: "/home/pix2seq_test/outputs/2025-11-14_08-52-44/checkpoint.pt"
  # pretrained_path: /workspaces/object-detection-rl/models/overfit_eval_pix2seq/v2/final_model.pt
  # pretrained_path: /workspaces/object-detection-rl/models/overfit_eval_pix2seq/v4/final_model.pt

training:
  output_dir: "./outputs"
  predictions_dir: "predictions"
  # num_epochs: 300
  # max_steps: 
  num_epochs: 100
  max_steps: 0
  batch_size: 8
  eval_batch_size: 4
  det_loss_weight: 1 
  kp_loss_weight: 1
  act_loss_weight: 0.4
  gradient_accumulation_steps: 1
  gradient_clip_value: null
  learning_rate: 0.0006
  weight_decay: 0.05
  warmup_epochs: 2
  beta1: 0.9
  beta2: 0.95
  eps: 0.00000001
  run_eval_freq: 10
  overfit_eval_set: true
  num_visualizations: 4
  use_wsd_scheduler: true


generation:
  top_p: 0.4
  top_k: 0
  temperature: 1.0
# generation:
#   top_p: 1.0  # 核采样
#   top_k: -1
#   temperature: 0.1